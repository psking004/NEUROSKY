<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Aura Habits - A beautiful, minimalist habit tracker">
  <title>Aura Habits</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="header-info">
        <h1 class="date-display" id="dateDisplay">Today</h1>
        <p class="subtitle">Welcome back, let's keep the streak going.</p>
      </div>
      <div class="progress-ring-container">
        <svg class="progress-ring" width="80" height="80">
          <circle class="progress-ring__circle-bg" stroke="#1e293b" stroke-width="6" fill="transparent" r="34" cx="40" cy="40"/>
          <circle class="progress-ring__circle" id="progressRing" stroke="url(#gradient)" stroke-width="6" fill="transparent" r="34" cx="40" cy="40"/>
          <defs>
            <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#8b5cf6" />
              <stop offset="100%" stop-color="#3b82f6" />
            </linearGradient>
          </defs>
        </svg>
        <div class="progress-text" id="progressText">0%</div>
      </div>
    </header>

    <main class="content">
      <div class="add-habit-container">
        <input type="text" id="habitInput" placeholder="What habit do you want to build?" autocomplete="off" />
        <button id="addHabitBtn" aria-label="Add Habit">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        </button>
      </div>

      <div class="habit-list" id="habitList">
        <!-- Habits will be injected here -->
      </div>
    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>
